{% extends 'base.html' %}
{% block content %}

<style>

.story-wrapper{
    max-width:700px;
    margin:40px auto;
    padding:20px;
}

.story-card{
    background:white;
    border-radius:16px;
    padding:25px;
    box-shadow:0 5px 20px rgba(0,0,0,0.06);
}

.story-title{
    text-align:center;
    margin-bottom:25px;
}

.story-title h2{
    margin:0;
    color:#4f46e5;
}

.story-title p{
    color:#777;
    font-size:14px;
    margin-top:5px;
}

.form-group{
    margin-bottom:18px;
}

.form-group label{
    display:block;
    margin-bottom:8px;
    font-weight:600;
    color:#333;
}

.form-group input,
.form-group textarea{
    width:100%;
    padding:12px;
    border:1px solid #ddd;
    border-radius:10px;
    font-size:14px;
    outline:none;
}

.form-group input:focus,
.form-group textarea:focus{
    border-color:#4f46e5;
}

.form-group textarea{
    min-height:220px;
    resize:vertical;
    line-height:1.6;
}

.tip-box{
    background:#eef2ff;
    border-radius:10px;
    padding:12px;
    font-size:13px;
    color:#555;
    margin-bottom:20px;
}

.publish-btn{
    width:100%;
    padding:14px;
    border:none;
    border-radius:10px;
    background:#4f46e5;
    color:white;
    font-size:15px;
    cursor:pointer;
    transition:0.3s;
}

.publish-btn:hover{
    opacity:0.9;
}

</style>

<div class="story-wrapper">

    <div class="story-card">

        <div class="story-title">
            <h2>📚 Start a Continue Story</h2>
            <p>Write the beginning. Others will continue it.</p>
        </div>

        <div class="tip-box">
            ✨ Write an interesting opening. Leave room for others to continue the story.
        </div>

        <form method="POST">

            {% csrf_token %}

            <div class="form-group">
                <label>Story Title</label>

                <input
                    type="text"
                    name="title"
                    placeholder="Example: The Last Train"
                    required
                >
            </div>

            <div class="form-group">
                <label>Beginning of the Story</label>

                <textarea
                    name="starter_content"
                    placeholder="The train arrived at midnight, but nobody got off..."
                    required
                ></textarea>
            </div>

            <button
                type="submit"
                class="publish-btn">

                🚀 Publish Story

            </button>

        </form>

    </div>

</div>

{% endblock %}
