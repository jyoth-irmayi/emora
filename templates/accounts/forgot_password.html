{% extends 'base.html' %}

{% block content %}

<style>

.forgot-container{
    min-height:85vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:40px 20px;
    background:#f8f9fc;
}

.forgot-card{
    width:100%;
    max-width:450px;
    background:white;
    padding:40px;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

.forgot-header{
    text-align:center;
    margin-bottom:30px;
}

.forgot-header h1{
    font-size:2rem;
    color:#222;
    margin-bottom:10px;
}

.forgot-header p{
    color:#666;
    line-height:1.7;
}

.form-group{
    margin-bottom:20px;
}

.form-group label{
    display:block;
    margin-bottom:8px;
    font-weight:600;
    color:#333;
}

.form-group input{
    width:100%;
    padding:14px;
    border:1px solid #ddd;
    border-radius:10px;
    font-size:15px;
    outline:none;
}

.form-group input:focus{
    border-color:#4f46e5;
}

.reset-btn{
    width:100%;
    padding:15px;
    border:none;
    border-radius:10px;
    background:#4f46e5;
    color:white;
    font-size:16px;
    font-weight:600;
    cursor:pointer;
}

.reset-btn:hover{
    opacity:0.95;
}

.back-login{
    text-align:center;
    margin-top:25px;
}

.back-login a{
    text-decoration:none;
    color:#4f46e5;
    font-weight:600;
}

.icon{
    text-align:center;
    font-size:50px;
    margin-bottom:15px;
}

</style>

<section class="forgot-container">

    <div class="forgot-card">

        <div class="icon">
            🔒
        </div>

        <div class="forgot-header">

            <h1>Forgot Password?</h1>

            <p>
                Enter your email address and we'll send you
                a link to reset your password.
            </p>

        </div>

        <form>

            <div class="form-group">

                <label>Email Address</label>

                <input
                    type="email"
                    placeholder="Enter your registered email">

            </div>

            <button class="reset-btn" type="submit">
                Send Reset Link
            </button>

        </form>

        <div class="back-login">
            <a href="#">← Back to Login</a>
        </div>

    </div>

</section>

{% endblock %}
