{% extends 'base.html' %}

{% block content %}

<style>

.register-container{
    min-height:85vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:40px 20px;
    background:#f8f9fc;
}

.register-card{
    width:100%;
    max-width:500px;
    background:white;
    padding:40px;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

.register-header{
    text-align:center;
    margin-bottom:30px;
}

.register-header h1{
    font-size:2.2rem;
    color:#222;
    margin-bottom:10px;
}

.register-header p{
    color:#777;
}

.form-group{
    margin-bottom:20px;
}

.form-group label{
    display:block;
    margin-bottom:8px;
    font-weight:600;
    color:#333;
}

.form-group input{
    width:100%;
    padding:14px;
    border:1px solid #ddd;
    border-radius:10px;
    font-size:15px;
    outline:none;
}

.form-group input:focus{
    border-color:#4f46e5;
}

.register-btn{
    width:100%;
    padding:15px;
    border:none;
    border-radius:10px;
    background:#4f46e5;
    color:white;
    font-size:16px;
    font-weight:600;
    cursor:pointer;
    margin-top:10px;
}

.register-btn:hover{
    opacity:0.95;
}

.divider{
    text-align:center;
    margin:25px 0;
    color:#888;
}

.social-buttons{
    display:flex;
    gap:10px;
}

.social-btn{
    flex:1;
    padding:12px;
    border:1px solid #ddd;
    background:white;
    border-radius:10px;
    cursor:pointer;
    font-weight:600;
}

.login-link{
    text-align:center;
    margin-top:25px;
    color:#666;
}

.login-link a{
    color:#4f46e5;
    text-decoration:none;
    font-weight:600;
}

</style>


<section class="register-container">

    <div class="register-card">

        <div class="register-header">
            <h1>Create Account</h1>
            <p>Join Emora and start sharing your stories.</p>
        </div>
        {% if error %}
        <p style="color: red;">{{error}}</p>
        {% endif %}
        <form method="POST">
            {% csrf_token %}
            <div class="form-group">
                <label>First Name</label>
                <input type="text" placeholder="Enter your full name" name="fname">
            </div>

            <div class="form-group">
                <label>last Name</label>
                <input type="text" placeholder="Enter your full name" name="lname">
            </div>

            <div class="form-group">
                <label>Username</label>
                <input type="text" placeholder="Choose a username" name="username">
            </div>

            <div class="form-group">
                <label>Email Address</label>
                <input type="email" placeholder="Enter your email" name="email">
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" placeholder="Create a password" name="password">
            </div>

            <div class="form-group">
                <label>Confirm Password</label>
                <input type="password" placeholder="Confirm password" name="repassword">
            </div>

            <button type="submit" class="register-btn">
                Create Account
            </button>

        </form>

        <div class="divider">
            OR
        </div>

        <div class="social-buttons">
            <button class="social-btn">Google</button>
            <button class="social-btn">GitHub</button>
        </div>

        <div class="login-link">
            Already have an account?
            <a href="{% url 'login' %}">Login</a>
        </div>

    </div>

</section>

{% endblock %}
