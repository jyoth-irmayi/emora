{% extends 'base.html' %}

{% block content %}

<style>
    .reset-wrapper {
        width: 380px;
        margin: 80px auto;
        background: white;
        padding: 30px;
        border-radius: 12px;
        box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        text-align: center;
    }

    h2 {
        margin-bottom: 10px;
    }

    p {
        color: #666;
        font-size: 14px;
        margin-bottom: 20px;
    }

    .input-box {
        width: 100%;
        padding: 12px;
        margin-bottom: 12px;
        border: 1px solid #ddd;
        border-radius: 8px;
        outline: none;
        font-size: 15px;
    }

    .input-box:focus {
        border-color: #6366f1;
    }

    .btn {
        width: 100%;
        padding: 12px;
        background: #6366f1;
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 16px;
        cursor: pointer;
    }

    .btn:hover {
        background: #4f46e5;
    }

    .error-message{
        background:#fee2e2;
        color:#b91c1c;
        padding:12px;
        border-radius:10px;
        margin-bottom:15px;
        font-size:14px;
    }

    .success-message{
        background:#dcfce7;
        color:#166534;
        padding:12px;
        border-radius:10px;
        margin-bottom:15px;
        font-size:14px;
    }
    
</style>

<div class="reset-wrapper">

    <h2>Reset Password 🔒</h2>
    <p>Enter your new password below</p>

    <form method="POST">
        {% csrf_token %}

        <input 
            type="password" 
            name="password" 
            class="input-box"
            placeholder="New Password"
            required
        >

        <input 
            type="password" 
            name="confirm_password" 
            class="input-box"
            placeholder="Confirm Password"
            required
        >

        {% if messages %}
            {% for message in messages %}

                <div class="
                    {% if message.tags == 'error' %}
                        error-message
                    {% else %}
                        success-message
                    {% endif %}
                ">
                    {{ message }}
                </div>

            {% endfor %}
        {% endif %}

        <button type="submit" class="btn">Reset Password</button>

    </form>

</div>

{% endblock %}
